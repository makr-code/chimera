[pytest]
# CHIMERA Suite pytest configuration

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    
# Coverage options (when using --cov)
# addopts = --cov=. --cov-report=html --cov-report=term-missing

# Test directories
testpaths = .

# Markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for complete workflows
    slow: Tests that take longer to run
    adapter: Database adapter tests
    rag: RAG/LLM evaluation tests
    ethics: Ethical AI tests
    statistical: Statistical analysis tests

# Minimum Python version
minversion = 3.8

# Ignore patterns
norecursedirs = 
    .git
    .pytest_cache
    __pycache__
    demo_reports
    *.egg-info
