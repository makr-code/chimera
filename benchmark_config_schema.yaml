    - id: "Aumueller2020"
      authors: ["Aumüller, M.", "Bernhardsson, E.", "Faithfull, A."]
      title: "ANN-Benchmarks: A benchmarking tool for approximate nearest neighbor algorithms"
      venue: "Information Systems"
      volume: 87
      year: 2020
      doi: "10.1016/j.is.2019.02.006"
      
    - id: "Erling2020"
      authors: ["Erling, O.", "Averbuch, A.", "Larriba-Pey, J.", "et al."]
