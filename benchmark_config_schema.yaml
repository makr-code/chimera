      authors: ["Kwon, W.", "Li, Z.", "Zhuang, S.", "Sheng, Y.", "et al."]
      title: "Efficient Memory Management for Large Language Model Serving with PagedAttention"
      venue: "ACM Symposium on Operating Systems Principles (SOSP)"
      year: 2023
      
  statistics:
    - id: "Welch1947"
